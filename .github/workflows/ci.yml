name: DevOps CI

permissions:
  contents: read
  packages: write

env:
  SONAR_ENABLED: "false"

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Repository Structure
        run: |
          echo "Checking repository..."
          test -d applications
          test -d kubernetes
          test -d helm
          echo "Repository structure verified."

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate Backend Helm Chart
        run: |
          helm lint helm/backend
          helm template backend helm/backend > /dev/null

      - name: Validate Frontend Helm Chart
        run: |
          helm lint helm/frontend
          helm template frontend helm/frontend > /dev/null

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t backend:ci \
            applications/backend

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -t frontend:ci \
            applications/frontend

      - name: SonarQube Scan
        if: ${{ env.SONAR_ENABLED == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: applications/backend

      - name: Install Trivy
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: backend:ci
          format: table
          exit-code: '0'

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: frontend:ci
          format: table
          exit-code: '0'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Backend Image
        run: |
          docker tag backend:ci ghcr.io/ravindranathsingh/backend:latest

      - name: Push Backend Image
        run: |
          docker push ghcr.io/ravindranathsingh/backend:latest

      - name: Tag Frontend Image
        run: |
          docker tag frontend:ci ghcr.io/ravindranathsingh/frontend:latest

      - name: Push Frontend Image
        run: |
          docker push ghcr.io/ravindranathsingh/frontend:latest
